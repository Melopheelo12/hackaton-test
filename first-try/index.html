<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Diagnostic Résilience - Bordeaux</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
    }

    header {
      background: #1e3a5f;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .container {
      display: flex;
      height: calc(100vh - 70px);
    }

    .sidebar {
      width: 300px;
      background: white;
      padding: 20px;
      box-shadow: 2px 0 5px rgba(0,0,0,0.1);
    }

    .map-container {
      flex: 1;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      background: #1e3a5f;
      color: white;
      border: none;
      cursor: pointer;
    }

    .result {
      margin-top: 20px;
      padding: 10px;
      background: #eef2f7;
    }
  </style>
</head>
<body>

<header>
  <h1>🌡️ Diagnostic Résilience - Bordeaux</h1>
</header>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h3>Analyser une adresse</h3>

    <input type="text" id="address" placeholder="Ex: 10 rue Sainte-Catherine">

    <button onclick="analyze()">Analyser</button>

    <div class="result" id="result">
      Entrez une adresse pour voir le diagnostic.
    </div>
  </div>

  <!-- Map -->
  <div class="map-container">
    <iframe 
      src="https://felt.com/embed/map/Untitled-Map-trd59Cqj4RuKu8WX9Cw2eYCD?loc=44.902%2C-0.6695%2C11.06z">
    </iframe>
  </div>

</div>

<script>
function analyze() {
  const address = document.getElementById("address").value;
  const result = document.getElementById("result");

  if (!address) {
    result.innerHTML = "⚠️ Veuillez entrer une adresse.";
    return;
  }

  // Simulation simple (hackathon MVP)
  const riskLevel = Math.random();

  let text = "";
  if (riskLevel > 0.7) {
    text = "🔴 Risque ÉLEVÉ : zone fortement exposée à la chaleur.<br>Conseil : végétaliser, éviter surfaces bétonnées.";
  } else if (riskLevel > 0.4) {
    text = "🟠 Risque MODÉRÉ : exposition intermédiaire.<br>Conseil : ajouter de l'ombre et des protections solaires.";
  } else {
    text = "🟢 Risque FAIBLE : zone relativement protégée.";
  }

  result.innerHTML = `
    <strong>Adresse :</strong> ${address}<br><br>
    ${text}
  `;
}
</script>

</body>
</html>
