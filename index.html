<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Diagnostic Résilience - Bordeaux</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      background: #eef2f7;
      color: #333;
    }

    header {
      background: linear-gradient(135deg, #1e3a5f, #2c5282);
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      display: flex;
      height: calc(100vh - 80px);
    }

    .sidebar {
      width: 320px;
      background: white;
      padding: 25px;
      box-shadow: 2px 0 10px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .sidebar h2 {
      font-size: 18px;
      margin-bottom: 10px;
    }

    input {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
      transition: 0.2s;
    }

    input:focus {
      border-color: #2c5282;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #2c5282;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #1e3a5f;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      background: #f7fafc;
      border-left: 5px solid #ccc;
      font-size: 14px;
      line-height: 1.5;
    }

    .high { border-left-color: #e53e3e; }
    .medium { border-left-color: #dd6b20; }
    .low { border-left-color: #38a169; }

    .map-container {
      flex: 1;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>

<body>

<header>
  🌡️ Diagnostic Résilience - Bordeaux
</header>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Analyse d’adresse</h2>

    <input type="text" id="address" placeholder="Ex: 10 rue Sainte-Catherine">

    <button onclick="analyze()">Analyser</button>

    <div id="result" class="result">
      Entrez une adresse pour obtenir un diagnostic.
    </div>
  </div>

  <!-- Map -->
  <div class="map-container">
    <iframe 
      src="https://felt.com/embed/map/Untitled-Map-trd59Cqj4RuKu8WX9Cw2eYCD?loc=44.902%2C-0.6695%2C11.06z">
    </iframe>
  </div>

</div>

<script>
function analyze() {
  const address = document.getElementById("address").value.trim();
  const result = document.getElementById("result");

  if (!address) {
    result.className = "result";
    result.innerHTML = "⚠️ Veuillez entrer une adresse.";
    return;
  }

  // Simulation réaliste de score (MVP hackathon)
  const score = Math.floor(Math.random() * 10) + 1;

  let level = "";
  let advice = "";
  let className = "";

  if (score >= 7) {
    level = "🔴 Risque ÉLEVÉ";
    advice = "Zone fortement exposée à la chaleur. Installez des protections solaires et végétalisez si possible.";
    className = "result high";
  } else if (score >= 4) {
    level = "🟠 Risque MODÉRÉ";
    advice = "Exposition intermédiaire. Ajoutez de l’ombre et limitez les surfaces bétonnées.";
    className = "result medium";
  } else {
    level = "🟢 Risque FAIBLE";
    advice = "Zone relativement protégée. Conditions favorables.";
    className = "result low";
  }

  result.className = className;

  result.innerHTML = `
    <strong>Adresse :</strong> ${address}<br><br>
    <strong>Score :</strong> ${score}/10<br>
    <strong>Niveau :</strong> ${level}<br><br>
    <strong>Conseil :</strong><br>
    ${advice}
  `;
}
</script>

</body>
</html>
