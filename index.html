<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Diagnostic Résilience - Bordeaux</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef2f7;
    }

    header {
      background: #1e3a5f;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .container {
      display: flex;
      height: calc(100vh - 70px);
    }

    .sidebar {
      width: 320px;
      background: white;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: 2px 0 8px rgba(0,0,0,0.1);
      position: relative;
    }

    input {
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      background: white;
      border: 1px solid #ccc;
      border-radius: 6px;
      max-height: 200px;
      overflow-y: auto;
      position: absolute;
      top: 80px;
      width: 280px;
      z-index: 1000;
    }

    li {
      padding: 10px;
      cursor: pointer;
    }

    li:hover {
      background: #f1f1f1;
    }

    .map-container {
      flex: 1;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    button {
      padding: 10px;
      background: #1e3a5f;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>🌡️ Diagnostic Résilience - Bordeaux</header>

<div class="container">

  <div class="sidebar">
    <input type="text" id="search" placeholder="Tape une adresse...">
    <ul id="suggestions"></ul>
    <button onclick="clearMap()">Réinitialiser carte</button>
  </div>

  <div class="map-container">
    <iframe id="map"
      src="https://felt.com/embed/map/Untitled-Map-trd59Cqj4RuKu8WX9Cw2eYCD?loc=44.902%2C-0.6695%2C11z">
    </iframe>
  </div>

</div>

<script>
const searchInput = document.getElementById("search");
const suggestionsBox = document.getElementById("suggestions");
const mapFrame = document.getElementById("map");

// 🔎 Autocomplete via API Nominatim
searchInput.addEventListener("input", async () => {
  const query = searchInput.value;

  if (query.length < 3) {
    suggestionsBox.innerHTML = "";
    return;
  }

  const res = await fetch(
    `https://nominatim.openstreetmap.org/search?format=json&q=${query}&limit=5&viewbox=-0.8,44.8,-0.5,45.0&bounded=1`
  );

  const data = await res.json();

  suggestionsBox.innerHTML = "";

  data.forEach(place => {
    const li = document.createElement("li");
    li.textContent = place.display_name;

    li.onclick = () => selectPlace(place);

    suggestionsBox.appendChild(li);
  });
});

// 📍 Quand on clique sur une adresse
function selectPlace(place) {
  const lat = place.lat;
  const lon = place.lon;

  searchInput.value = place.display_name;
  suggestionsBox.innerHTML = "";

  // Zoom carte Felt (via paramètres URL)
  const newUrl = `https://felt.com/embed/map/Untitled-Map-trd59Cqj4RuKu8WX9Cw2eYCD?loc=${lat}%2C${lon}%2C16z`;

  mapFrame.src = newUrl;
}

// 🔄 Reset map
function clearMap() {
  mapFrame.src = "https://felt.com/embed/map/Untitled-Map-trd59Cqj4RuKu8WX9Cw2eYCD?loc=44.902%2C-0.6695%2C11z";
  searchInput.value = "";
  suggestionsBox.innerHTML = "";
}
</script>

</body>
</html>
